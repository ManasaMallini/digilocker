{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Verify Your Email</h1>
        <p>Enter the 6-digit code we sent to your email.</p>
        <p style="font-size: 0.875rem; color: var(--warning);">Note: For this clone, the OTP is printed in the server logs / database.</p>
        
        <form id="verify-form">
            <div class="form-group">
                <label>Verification Code</label>
                <input type="text" id="otp-input" class="form-input" placeholder="000000" maxlength="6" required>
            </div>
            
            <button type="submit" class="btn btn-primary">Verify Account</button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('verify-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const otp = document.getElementById('otp-input').value;

    try {
        const response = await api.request('/auth/verify-otp/', {
            method: 'POST',
            body: JSON.stringify({ otp })
        });

        if (response.ok) {
            utils.showToast('Verification successful!');
            setTimeout(() => { window.location.href = '/dashboard/'; }, 1500);
        } else {
            utils.showToast('Invalid verification code', 'error');
        }
    } catch (error) {
        utils.showToast('Something went wrong', 'error');
    }
});
</script>
{% endblock %}
