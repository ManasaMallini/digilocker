{% extends 'base.html' %}

{% block content %}
<div class="app-container">
    <aside class="sidebar">
        <div style="margin-bottom: 2rem; display: flex; align-items: center; gap: 0.75rem;">
            <i class="fas fa-vault" style="font-size: 1.5rem; color: var(--primary);"></i>
            <h2 style="font-size: 1.25rem;">DigiLocker</h2>
        </div>
        
        <nav>
            <ul style="list-style: none;">
                <li style="margin-bottom: 0.5rem;">
                    <a href="/dashboard/" class="btn" style="text-align: left; padding: 0.75rem 1rem; color: var(--text-dark);">
                        <i class="fas fa-home" style="margin-right: 0.75rem;"></i> Dashboard
                    </a>
                </li>
                <li style="margin-bottom: 0.5rem;">
                    <a href="/profile/" class="btn btn-primary" style="text-align: left; padding: 0.75rem 1rem;">
                        <i class="fas fa-user" style="margin-right: 0.75rem;"></i> Profile
                    </a>
                </li>
                <li style="margin-top: 2rem;">
                    <button id="logout-btn" class="btn" style="text-align: left; padding: 0.75rem 1rem; color: var(--danger);">
                        <i class="fas fa-sign-out-alt" style="margin-right: 0.75rem;"></i> Logout
                    </button>
                </li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <h1 style="margin-bottom: 2rem;">My Profile</h1>
        
        <div class="auth-card" style="max-width: 600px;">
            <form id="profile-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="text" id="profile-email" class="form-input" readonly style="background: var(--bg-light);">
                </div>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="profile-name" class="form-input" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="profile-phone" class="form-input" placeholder="Enter your phone number">
                </div>
                <div class="form-group">
                    <label>Account Status</label>
                    <div id="account-status" style="font-weight: 600;">Loading...</div>
                </div>
                
                <button type="submit" class="btn btn-primary">Update Profile</button>
            </form>
        </div>
    </main>
</div>
{% endblock %}

{% block extra_js %}
<script>
    async function loadProfile() {
        try {
            const res = await api.request('/auth/profile/');
            if (res.ok) {
                const data = await res.json();
                document.getElementById('profile-email').value = data.email;
                document.getElementById('profile-name').value = data.profile?.full_name || '';
                document.getElementById('profile-phone').value = data.profile?.phone_number || '';
                
                const status = document.getElementById('account-status');
                status.textContent = data.is_verified ? 'Verified ✓' : 'Unverified (Please verify OTP)';
                status.style.color = data.is_verified ? 'var(--success)' : 'var(--danger)';
            }
        } catch (error) {
            utils.showToast('Failed to load profile', 'error');
        }
    }

    document.getElementById('profile-form').onsubmit = async (e) => {
        e.preventDefault();
        const full_name = document.getElementById('profile-name').value;
        const phone_number = document.getElementById('profile-phone').value;

        try {
            const res = await api.request('/auth/profile/', {
                method: 'PATCH',
                body: JSON.stringify({ profile: { full_name, phone_number } })
            });
            if (res.ok) {
                utils.showToast('Profile updated successfully');
            } else {
                utils.showToast('Update failed', 'error');
            }
        } catch (error) {
            utils.showToast('Something went wrong', 'error');
        }
    };

    document.getElementById('logout-btn').onclick = () => {
        api.clearTokens();
        window.location.href = '/login/';
    };

    window.onload = loadProfile;
</script>
{% endblock %}
